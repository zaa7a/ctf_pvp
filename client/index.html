<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>CTF PvP Simulator Client</title>
  <style>
    body { font-family: sans-serif; background: #1e1e1e; color: #fff; padding: 20px; }
    .container { display: flex; gap: 20px; }
    .box { flex: 1; background: #2d2d2d; padding: 15px; border-radius: 5px; }
    textarea { width: 100%; height: 80px; background: #111; color: #0f0; border: 1px solid #333; }
    #logArea { height: 200px; overflow-y: scroll; background: #000; padding: 10px; font-family: monospace; }
    .btn { padding: 10px 20px; background: #007acc; border: none; color: white; cursor: pointer; }
    .btn:disabled { background: #555; }
  </style>
</head>
<body>
<h1>CTF PvP Simulator</h1>
<div id="roleSelection">
  <h3>ロールを選択してください:</h3>
  <button class="btn" onclick="selectRole('ATTACKER')">ATTACKERとして参戦</button>
  <button class="btn" onclick="selectRole('DEFENDER')">DEFENDERとして参戦</button>
</div>

<h2 id="myRoleDisplay">あなたのロール: 未選択</h2>
<h3 id="turnDisplay">現在のターン: - (フェーズ: -)</h3>

<div class="container">
  <div class="box">
    <h3>コマンド入力欄 (JSON形式)</h3>
    <p>※Thoughts (思考) と Commands を入力して送信します。</p>
    <textarea id="thoughtsInput" placeholder="思考（日本語で記述...）"></textarea>
    <textarea id="commandsInput" placeholder='[{"type": "ENUMERATE_ROUTES", "ip": "214.209.149.27"}]'></textarea>
    <br/><br/>
    <button id="submitBtn" class="btn" onclick="sendTurnData()" disabled>ターン終了・コマンド送信</button>
  </div>

  <div class="box">
    <h3>リアルタイムコンソールログ</h3>
    <div id="logArea"></div>
  </div>
</div>

<br/>
<button class="btn" style="background:#cc3333;" onclick="resetGame()">ゲームリセット</button>

<script src="./renderer.js"></script>
</body>
</html>
